apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-frontend
  namespace: url-shortener
  labels:
    app: url-shortener
    component: frontend
    environment: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: url-shortener
      component: frontend
  template:
    metadata:
      labels:
        app: url-shortener
        component: frontend
        environment: production
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: frontend
          image: url-shortener/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          env:
            - name: VITE_API_BASE_URL
              value: "https://api.shorturl.com/api/v1"
            - name: VITE_APP_URL
              value: "https://app.shorturl.com"
            - name: VITE_REDIRECT_BASE_URL
              value: "https://shorturl.com"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
