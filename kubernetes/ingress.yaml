apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-shortener-ingress
  namespace: url-shortener
  labels:
    app: url-shortener
    environment: production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.shorturl.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range, Authorization, X-Request-Id"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # Security
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Upstream keepalive
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "32"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "60"

spec:
  tls:
    - hosts:
        - api.shorturl.com
        - app.shorturl.com
        - shorturl.com
        - www.shorturl.com
      secretName: url-shortener-tls
  rules:
    - host: api.shorturl.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: url-shortener-backend
                port:
                  number: 3000

    - host: app.shorturl.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: url-shortener-frontend
                port:
                  number: 80

    - host: shorturl.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: url-shortener-backend
                port:
                  number: 3000

    - host: www.shorturl.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: url-shortener-backend
                port:
                  number: 3000
