apiVersion: v1
kind: Service
metadata:
  name: url-shortener-frontend
  namespace: url-shortener
  labels:
    app: url-shortener
    component: frontend
    environment: production
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: url-shortener
    component: frontend
