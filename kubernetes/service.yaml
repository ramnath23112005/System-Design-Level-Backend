apiVersion: v1
kind: Service
metadata:
  name: url-shortener-backend
  namespace: url-shortener
  labels:
    app: url-shortener
    component: backend
    environment: production
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: url-shortener
    component: backend
