services:
  - type: web
    name: urlshortener-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:shared && npm run build:backend
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: urlshortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: urlshortener-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGIN
        value: "*"
      - key: LOG_LEVEL
        value: info
      - key: REDIRECT_BASE_URL
        value: https://urlshortener-backend.onrender.com
      - key: API_BASE_URL
        value: https://urlshortener-backend.onrender.com/api/v1
      - key: QR_CODE_BASE_URL
        value: https://urlshortener-backend.onrender.com

  - type: web
    name: urlshortener-frontend
    env: static
    region: oregon
    buildCommand: npm install && npm run build:frontend
    staticPublishPath: packages/frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://urlshortener-backend.onrender.com/api/v1
      - key: NODE_VERSION
        value: "18"

databases:
  - name: urlshortener-db
    plan: free
    region: oregon
    databaseName: url_shortener
    ipAllowList: []

redis:
  - name: urlshortener-redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction
