# API Server - api.shorturl.com
server {
  listen 443 ssl http2;
  server_name api.shorturl.com;

  ssl_certificate /etc/nginx/ssl/api.shorturl.com.crt;
  ssl_certificate_key /etc/nginx/ssl/api.shorturl.com.key;

  access_log /var/log/nginx/api.access.log with_request_id;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # CORS headers
  add_header Access-Control-Allow-Origin $http_origin always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
  add_header Access-Control-Allow-Headers "DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range, Authorization, X-Request-Id" always;
  add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-Request-Id" always;
  add_header Access-Control-Allow-Credentials "true" always;

  # Request body size limit
  client_max_body_size 5m;
  proxy_request_buffering off;

  # Rate limiting
  limit_req zone=api_limit burst=20 nodelay;
  limit_conn conn_limit 10;

  location / {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_buffering off;
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    add_header X-Request-Id $request_id always;
  }

  # Cache control for API responses
  location /api/v1/health {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location /api/v1/qrcode {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, immutable" always;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}

# App Server - app.shorturl.com
server {
  listen 443 ssl http2;
  server_name app.shorturl.com;

  ssl_certificate /etc/nginx/ssl/app.shorturl.com.crt;
  ssl_certificate_key /etc/nginx/ssl/app.shorturl.com.key;

  access_log /var/log/nginx/app.access.log with_request_id;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Root directory for frontend static files
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback for client-side routing
  location / {
    try_files $uri $uri/ /index.html;

    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # Static assets with fingerprint (webpack/vite hash)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
  }

  # Favicon
  location /favicon.ico {
    expires 30d;
    add_header Cache-Control "public, immutable" always;
    access_log off;
    log_not_found off;
  }

  # Service worker
  location /sw.js {
    add_header Cache-Control "no-cache" always;
    access_log off;
  }

  # Health check endpoint for load balancer
  location /health {
    access_log off;
    return 200 "healthy";
    add_header Content-Type text/plain;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}

# Redirect Server - shorturl.com
server {
  listen 443 ssl http2;
  server_name shorturl.com www.shorturl.com;

  ssl_certificate /etc/nginx/ssl/shorturl.com.crt;
  ssl_certificate_key /etc/nginx/ssl/shorturl.com.key;

  access_log /var/log/nginx/redirect.access.log with_request_id;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Rate limiting for redirects
  limit_req zone=redirect_limit burst=50 nodelay;

  # No caching for redirects
  add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  add_header Pragma "no-cache" always;
  expires 0;

  location / {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_buffering off;

    proxy_connect_timeout 10s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
